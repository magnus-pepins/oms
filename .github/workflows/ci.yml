name: OMS CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Warm images used by Testcontainers so pulls do not race test timeouts or Hub limits.
      - name: Pre-pull container images used in tests
        run: |
          docker pull postgres:16-alpine &
          docker pull nats:2.10.22-alpine &
          wait

      - name: Test
        run: ./gradlew clean test --no-daemon --no-build-cache --stacktrace

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: oms-test-reports
          path: |
            build/reports/tests/
            build/test-results/

      - name: Assemble
        run: ./gradlew bootJar --no-daemon --no-build-cache
