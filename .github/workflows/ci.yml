name: OMS CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Gradle clean test + Docker pulls should finish well under this; cap avoids zombie jobs when a step hangs.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Single-project builds rarely benefit from parallel task execution; disabling avoids
      # rare races with Testcontainers + Spring context lifecycle on GitHub-hosted runners.
      - name: Disable Gradle parallel tasks on CI
        run: printf '\n# CI stability (see workflow)\norg.gradle.parallel=false\n' >> gradle.properties

      # Warm images used by Testcontainers so pulls do not race test timeouts or Hub limits.
      - name: Pre-pull container images used in tests
        run: |
          docker pull postgres:16-alpine &
          docker pull nats:2.10.22-alpine &
          wait

      - name: Test
        env:
          # Ryuk sidecar occasionally fails to start on GitHub-hosted runners; disabling is a
          # documented Testcontainers trade-off for CI (containers still stop with the JVM).
          TESTCONTAINERS_RYUK_DISABLED: true
        run: ./gradlew clean test --no-daemon --no-build-cache --stacktrace

      - name: Print failing JUnit XML to the log
        if: failure()
        run: |
          set -u
          echo "==== test-results tree ===="
          ls -laR build/test-results 2>&1 || true
          echo "==== JUnit XML (first 400 lines each) ===="
          shopt -s nullglob || true
          for f in build/test-results/test/*.xml; do
            echo "======== $f ========"
            head -n 400 "$f" || true
          done

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: oms-test-reports
          path: |
            build/reports/tests/
            build/test-results/

      - name: Assemble
        run: ./gradlew bootJar --no-daemon --no-build-cache
