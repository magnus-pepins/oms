name: OMS CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Integration tests use the job-level Postgres service (not Testcontainers Postgres) so the DB
    # is not co-located with the Gradle JVM on a memory-tight runner.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: oms
          POSTGRES_PASSWORD: oms
          POSTGRES_DB: oms
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U oms -d oms"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30

    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Single-project builds rarely benefit from parallel task execution; disabling avoids
      # rare races with Testcontainers + Spring context lifecycle on GitHub-hosted runners.
      - name: Disable Gradle parallel tasks on CI
        run: printf '\n# CI stability (see workflow)\norg.gradle.parallel=false\n' >> gradle.properties

      # Warm images used by Testcontainers (NATS, CI placeholder alpine, etc.); IT Postgres is the GHA service above.
      - name: Pre-pull container images used in tests
        run: |
          docker pull nats:2.10.22-alpine &
          wait

      - name: Wait for Postgres service TCP
        run: |
          for i in $(seq 1 90); do
            if bash -c "echo > /dev/tcp/127.0.0.1/5432" 2>/dev/null; then
              echo "port 5432 open"
              exit 0
            fi
            sleep 1
          done
          echo "timeout waiting for 127.0.0.1:5432"
          exit 1

      - name: Test
        env:
          # Ryuk sidecar occasionally fails to start on GitHub-hosted runners; disabling is a
          # documented Testcontainers trade-off for CI (containers still stop with the JVM).
          TESTCONTAINERS_RYUK_DISABLED: true
          # GHA postgres service above — SettlementPipelineIntegrationTest and other
          # AbstractPostgresIntegrationTest suites use this URL (no Testcontainers Postgres).
          OMS_CI_JDBC_URL: jdbc:postgresql://127.0.0.1:5432/oms
          OMS_CI_JDBC_USER: oms
          OMS_CI_JDBC_PASSWORD: oms
        run: ./gradlew clean test --no-daemon --no-build-cache --stacktrace

      - name: Print failing JUnit XML to the log
        if: failure()
        run: |
          set -u
          echo "==== test-results tree ===="
          ls -laR build/test-results 2>&1 || true
          echo "==== JUnit XML (first 400 lines each) ===="
          shopt -s nullglob || true
          for f in build/test-results/test/*.xml; do
            echo "======== $f ========"
            head -n 400 "$f" || true
          done

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: oms-test-reports
          path: |
            build/reports/tests/
            build/test-results/

      - name: Assemble
        run: ./gradlew bootJar bootJarIngressReplica bootJarClusterNode bootJarPostgresProjector bootJarFixEgress --no-daemon --no-build-cache

      - name: Verify ingress-replica entrypoints
        run: ./gradlew help --task bootRunIngressReplica --no-daemon --no-build-cache
