services:
  # OMS local dev / IT Postgres. Bound to host port 5440 (NOT the Postgres default
  # 5432) because the Balh dev workstation's 5432 is already used by the
  # supabase-db container in the customer-frontend / beard-admin Supabase stack.
  # When running ITs, set OMS_CI_JDBC_URL=jdbc:postgresql://127.0.0.1:5440/oms so
  # AbstractPostgresIntegrationTest takes the externally-managed-Postgres path
  # (avoids Docker Desktop's /var/run/docker.sock socket-redirect issue with the
  # Testcontainers Java client on macOS — see oms/docs/runbooks/local-multi-jvm-bench.md).
  postgres:
    image: postgres:16-alpine
    container_name: oms-postgres
    environment:
      POSTGRES_DB: oms
      POSTGRES_USER: oms
      POSTGRES_PASSWORD: oms
    ports:
      - "5440:5432"
    volumes:
      - oms-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oms -d oms"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional JetStream: `docker compose --profile with-nats up -d` then set
  # OMS_NATS_ENABLED=true and OMS_NATS_URL=nats://localhost:4222 for bootRun.
  nats:
    image: nats:2.10.22-alpine
    container_name: oms-nats
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"
    profiles: ["with-nats"]

  # Optional: isolated Postgres for QuickFIX JdbcStore only (plan §6.4).
  # `docker compose --profile with-fix-session-db up -d postgres-fix-sessions`
  # then apply V9 DDL — see docs/fix-session-store-isolation.md
  postgres-fix-sessions:
    image: postgres:16-alpine
    container_name: oms-postgres-fix-sessions
    profiles: ["with-fix-session-db"]
    environment:
      POSTGRES_DB: oms_fix_store
      POSTGRES_USER: oms_fix
      POSTGRES_PASSWORD: oms_fix
    ports:
      - "5433:5432"
    volumes:
      - oms-postgres-fix-sessions-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oms_fix -d oms_fix_store"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  oms-postgres-data:
  oms-postgres-fix-sessions-data:
