syntax = "proto3";

package balh.oms.control.v1;

import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_package = "com.balh.oms.proto.control.v1";

// One hop in the control pipeline (ingress JVM, reconciler JVM, control tail JVM, …). Replay Chronicle in order;
// {@code ControlPipelineTelemetry} excerpts carry the cumulative list including {@code control_tail_apply}.
message TelemetryHop {
  string stage = 1;
  google.protobuf.Timestamp observed_at = 2;
}

// Control-plane event appended to Chronicle (after outbox) and wrapped in Postgres outbox JSONB; see ControlChroniclePayloadCodec.
message ControlPendingEvent {
  string type = 1;
  string order_id = 2;
  int32 order_version = 3;
  int32 shard_id = 4;
  string account_id_hash = 5;
  google.protobuf.Timestamp order_timestamp = 6;
  google.protobuf.Timestamp enqueued_at = 7;
  // Redundant with the reconciler hop in telemetry_hops; kept for dashboards that already key off this field.
  google.protobuf.Timestamp chronicle_materialized_at = 8;
  repeated TelemetryHop telemetry_hops = 9;
}
