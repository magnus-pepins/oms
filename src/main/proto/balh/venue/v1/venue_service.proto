syntax = "proto3";

package balh.venue.v1;

option java_multiple_files = true;
option java_package = "com.balh.venue.grpc.v1";
option java_outer_classname = "VenueServiceProto";

service VenueOrderService {
  rpc RouteOrder(RouteOrderRequest) returns (RouteOrderResponse);
  // Pipelined, order-preserving variant of RouteOrder. The client writes RouteOrderRequests in
  // admission order on one stream; the gateway offers each to the venue cluster in that stream
  // order on a single thread, so cluster apply order (hence price-time priority) matches the
  // client's send order. Acks return asynchronously on the response stream (correlate by
  // oms_order_id, NOT by response order). One stream == one ordered cluster session. See
  // system-documentation/plans/oms-venue-egress-pipelining.md.
  rpc RouteOrderStream(stream RouteOrderRequest) returns (stream RouteOrderResponse);
  rpc RouteCancel(RouteCancelRequest) returns (RouteCancelResponse);
  rpc RouteReplace(RouteReplaceRequest) returns (RouteReplaceResponse);
  rpc StreamExecutionReports(StreamExecutionReportsRequest) returns (stream ExecutionReport);
  rpc StreamQuotes(StreamQuotesRequest) returns (stream QuoteUpdate);
  // Golden-copy point liveness query: "is this order (by oms_order_id) still resting in the
  // book right now?" Answered from the authoritative in-cluster matching state, not the Postgres
  // mirror. Used by OMS startup / periodic order-state reconciliation to detect and terminate
  // orders OMS believes are WORKING but the venue has dropped (e.g. rejected on replay after a
  // matching-semantics change). See system-documentation/plans/oms-internal-venue-and-prediction-market.md.
  rpc QueryOrderStatus(QueryOrderStatusRequest) returns (QueryOrderStatusResponse);
}

message RouteOrderRequest {
  string oms_order_id = 1;
  string instrument_symbol = 2;
  int64 quantity_scaled = 3;
  int64 limit_price_scaled = 4;
  int32 side = 5;
  string counterparty_id = 6;
}

message RouteOrderResponse {
  bool accepted = 1;
  string reject_reason = 2;
  ExecutionReport execution_report = 3;
  // Always set, so the streaming caller can demux a response to its request even when there is no
  // execution_report (reject). On the unary RouteOrder path this is redundant with the request.
  string oms_order_id = 4;
}

message RouteCancelRequest {
  string oms_order_id = 1;
  string instrument_symbol = 2;
}

message RouteCancelResponse {
  bool accepted = 1;
  string reject_reason = 2;
  ExecutionReport execution_report = 3;
}

message RouteReplaceRequest {
  string oms_order_id = 1;
  string instrument_symbol = 2;
  int64 new_quantity_scaled = 3;
  int64 new_limit_price_scaled = 4;
  int32 side = 5;
}

message RouteReplaceResponse {
  bool accepted = 1;
  string reject_reason = 2;
  ExecutionReport execution_report = 3;
}

message StreamExecutionReportsRequest {
  string consumer_id = 1;
}

message StreamQuotesRequest {
  string symbol = 1;
}

enum LiquidityRole {
  LIQUIDITY_ROLE_UNSPECIFIED = 0;
  LIQUIDITY_ROLE_TAKER = 1;
  LIQUIDITY_ROLE_MAKER = 2;
}

message ExecutionReport {
  string oms_order_id = 1;
  string venue_exec_ref = 2;
  int64 last_qty_scaled = 3;
  int64 last_px_scaled = 4;
  int64 venue_ts_nanos = 5;
  ExecType exec_type = 6;
  LiquidityRole liquidity_role = 7;
}

enum ExecType {
  EXEC_TYPE_UNSPECIFIED = 0;
  EXEC_TYPE_TRADE = 1;
  EXEC_TYPE_CANCEL = 2;
  EXEC_TYPE_REPLACE = 3;
  // Venue accepted a new order that rested without (fully) filling — the order is now live/working
  // at the venue. Drives the OMS PENDING_NEW -> WORKING transition. Carries no fill (last_qty=0).
  EXEC_TYPE_NEW = 4;
}

message QuoteUpdate {
  string symbol = 1;
  int64 bid_scaled = 2;
  int64 ask_scaled = 3;
  int64 published_at_nanos = 4;
}

message QueryOrderStatusRequest {
  string oms_order_id = 1;
  string instrument_symbol = 2;
}

message QueryOrderStatusResponse {
  string oms_order_id = 1;
  OrderLiveness liveness = 2;
  // Meaningful only when liveness == ORDER_LIVENESS_LIVE; 0 otherwise.
  int64 remaining_qty_scaled = 3;
  int64 limit_price_scaled = 4;
}

enum OrderLiveness {
  ORDER_LIVENESS_UNSPECIFIED = 0;
  // The order is currently resting in the canonical book for its symbol.
  ORDER_LIVENESS_LIVE = 1;
  // The order is not resting: it filled, was cancelled, was rejected (including on replay), or was
  // never known to this venue. The venue does not retain terminal order history, so these cases are
  // indistinguishable here; the caller disambiguates using its own order state + an age gate.
  ORDER_LIVENESS_NOT_LIVE = 2;
}
