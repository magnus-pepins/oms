# Phase 3 of system-documentation/plans/oms-aeron-cluster-substrate.md: oms-fix-egress role.
#
# This JVM consumes the cluster events recording (OmsClusterWireFormat.EVENTS_CHANNEL /
# EVENTS_STREAM_ID) via Aeron Archive replay (mirrors oms-postgres-projector on the FIX side) and
# owns the QuickFIX/J SocketInitiator that ships NewOrderSingle to the broker. It must NOT run
# order-accept HTTP/gRPC (ORDER_ACCEPT_PROFILE excludes oms-fix-egress) and is mutex with every
# other role profile (TopologyWorkerProfiles + FixEgressTopologyValidator).
#
# Slice 3d (current): outbound NOS via Aeron Archive replay (slice 3b-2) PLUS inbound
# ExecutionReport / OrderCancelReject translated to ApplyExecutionReportCommand and offered back
# via OmsClusterIngressClient. The cluster client is now REQUIRED on this JVM
# (FixEgressTopologyValidator rejects cluster.client.enabled=false on the egress profile).
#
# Example: SPRING_PROFILES_ACTIVE=oms-fix-egress
#
# Production: set OMS_FIX_EGRESS_AERON_DIR to the cluster member's media-driver directory. As
# with oms-postgres-projector, multi-host deploys either co-locate this JVM on each cluster
# member (recommended for low-latency reads) or wire AeronArchive remote replay over UDP in
# Phase 5.

oms:
  grpc:
    enabled: false
  cluster:
    client:
      # Slice 3d: required on this JVM. Inbound FIX ExecutionReport / OrderCancelReject is
      # translated to ApplyExecutionReportCommand and offered to the cluster via
      # OmsClusterIngressClient. FixEgressTopologyValidator fails fast if this is false.
      enabled: ${OMS_FIX_EGRESS_CLUSTER_CLIENT_ENABLED:true}
      # The cluster client connects to the same media-driver as the egress's Archive replay.
      # Defaulting to OMS_FIX_EGRESS_AERON_DIR lets the operator point both at the cluster
      # member's media-driver with one env var; can be overridden when the egress reads from a
      # local replay-host driver but writes to the cluster's main driver.
      aeron-directory: ${OMS_FIX_EGRESS_CLUSTER_CLIENT_AERON_DIR:${OMS_FIX_EGRESS_AERON_DIR:}}
      ingress-endpoints: ${OMS_FIX_EGRESS_CLUSTER_CLIENT_INGRESS_ENDPOINTS:0=localhost:20110}
      ingress-channel: ${OMS_FIX_EGRESS_CLUSTER_CLIENT_INGRESS_CHANNEL:aeron:udp?endpoint=localhost:0}
      egress-channel: ${OMS_FIX_EGRESS_CLUSTER_CLIENT_EGRESS_CHANNEL:aeron:udp?endpoint=localhost:0}
    fix-egress:
      enabled: ${OMS_FIX_EGRESS_ENABLED:true}
      # Aeron MediaDriver directory of the cluster member this JVM consumes from. For local
      # dev / single-host deploys this is the same value as oms.cluster.client.aeron-directory
      # in mixed roles. Empty string skips the replay loop with a warn log (used by Spring
      # context-only ITs that do not stand up a media driver).
      aeron-directory: ${OMS_FIX_EGRESS_AERON_DIR:}
      archive-control-request-channel: ${OMS_FIX_EGRESS_ARCHIVE_CONTROL_REQUEST_CHANNEL:aeron:ipc?term-length=64k}
      archive-control-response-channel: ${OMS_FIX_EGRESS_ARCHIVE_CONTROL_RESPONSE_CHANNEL:aeron:ipc?term-length=64k}
      replay-channel: ${OMS_FIX_EGRESS_REPLAY_CHANNEL:aeron:ipc?term-length=64k}
      # Distinct from oms.cluster.projector.replay-stream-id (4321) and the in-test projector
      # singleton stream id (4322) — both consume the same EVENTS recording over independent
      # replay subscriptions and must not collide on the replay channel's stream id.
      replay-stream-id: ${OMS_FIX_EGRESS_REPLAY_STREAM_ID:4323}
      poll-park-nanos: ${OMS_FIX_EGRESS_POLL_PARK_NANOS:1000000}
      fragment-limit: ${OMS_FIX_EGRESS_FRAGMENT_LIMIT:64}
      recording-lookup-park-ms: ${OMS_FIX_EGRESS_RECORDING_LOOKUP_PARK_MS:100}
      # Park between Session.sendToTarget retries when the QuickFIX initiator is mid-reconnect.
      # Same shape as oms.fix.outbound-dedicated-not-ready-park-nanos on the legacy worker; named
      # separately so the egress can be tuned independently.
      session-not-ready-park-nanos: ${OMS_FIX_EGRESS_SESSION_NOT_READY_PARK_NANOS:50000000}
  routing:
    backend: fix
  fix:
    auto-start: ${OMS_FIX_EGRESS_AUTO_START:true}

# Separate management port so probes/metrics do not share the main HTTP connector with other roles deployed nearby.
management:
  server:
    port: ${OMS_FIX_EGRESS_MANAGEMENT_SERVER_PORT:8091}
