# Horizontal ingress replica — same order-accept surface as the monolith. Submits AcceptOrderCommand through
# OmsClusterIngressClient. Phase 3 slice 3g removed the local Chronicle / control-tail / postgres-write-path
# knobs.
#
# Do not combine oms-ingress-replica with oms-postgres-projector or oms-fix-egress on the same JVM
# (TopologyWorkerProfiles).

oms:
  cluster:
    client:
      # Required on this profile: OrderIngressService takes OmsClusterIngressClient as a non-optional
      # dependency. Defaulted true here so the profile is bootable without extra env wiring; flip via
      # OMS_CLUSTER_CLIENT_ENABLED=false only in profile-test contexts that mock the client.
      enabled: ${OMS_CLUSTER_CLIENT_ENABLED:true}
      # Defaults to the cluster-node bootstrap's media-driver path when both JVMs run on the same host
      # (oms/docs/runbooks/local-multi-jvm-bench.md). Override OMS_CLUSTER_CLIENT_AERON_DIRECTORY when the
      # ingress-replica is on a separate host from the cluster member it talks to (Phase 5 / k8s).
      aeron-directory: ${OMS_CLUSTER_CLIENT_AERON_DIRECTORY:${OMS_AERON_MEDIA_DRIVER_DIR:${OMS_AERON_DIR_BASE:build/aeron-cluster}/media-driver}}
      ingress-endpoints: ${OMS_CLUSTER_CLIENT_INGRESS_ENDPOINTS:0=localhost:20110}
      # Slice 4m: ingress / egress channel default to UDP with port 0 (ephemeral). When N
      # ingress-replicas share one host (and one Aeron media driver), each replica's cluster
      # client gets a distinct ephemeral UDP port automatically — no operator-side port
      # bookkeeping is required. Override these env vars only when binding to a specific
      # interface (multi-host k8s) or pinning a port for a firewall rule. Mirrors the same
      # knobs already exposed on oms-fix-egress.
      ingress-channel: ${OMS_CLUSTER_CLIENT_INGRESS_CHANNEL:aeron:udp?endpoint=localhost:0}
      egress-channel: ${OMS_CLUSTER_CLIENT_EGRESS_CHANNEL:aeron:udp?endpoint=localhost:0}
      # Phase 4 Tier 2.5 phase D-6: opt-in admit-batcher. Disabled by default — slice 4n's
      # single-message offer path is the safe baseline. Flip enabled=true on Pop! / single-host
      # benches to amortise per-message cluster framing overhead across N admits per cluster log
      # slot. See oms/docs/runbooks/local-multi-jvm-bench.md § Tier 2.5 phase D-6 for tuning.
      admit-batch:
        enabled: ${OMS_CLUSTER_CLIENT_ADMIT_BATCH_ENABLED:false}
        max-batch-size: ${OMS_CLUSTER_CLIENT_ADMIT_BATCH_MAX_SIZE:16}
        flush-interval-nanos: ${OMS_CLUSTER_CLIENT_ADMIT_BATCH_FLUSH_INTERVAL_NANOS:50000}
        queue-capacity: ${OMS_CLUSTER_CLIENT_ADMIT_BATCH_QUEUE_CAPACITY:8192}
        enqueue-park-nanos: ${OMS_CLUSTER_CLIENT_ADMIT_BATCH_ENQUEUE_PARK_NANOS:1000}

management:
  server:
    port: ${OMS_INGRESS_REPLICA_MANAGEMENT_SERVER_PORT:8087}
