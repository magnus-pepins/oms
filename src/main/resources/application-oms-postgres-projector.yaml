# Phase 2 of system-documentation/plans/oms-aeron-cluster-substrate.md: oms-postgres-projector role.
#
# This JVM consumes the cluster events recording (OmsClusterWireFormat.EVENTS_CHANNEL /
# EVENTS_STREAM_ID) via Aeron Archive replay and writes Postgres projection rows. It must NOT run
# order-accept HTTP/gRPC (ORDER_ACCEPT_PROFILE excludes oms-postgres-projector) and must NOT run a
# FIX SocketInitiator (one initiator per route lives on oms-fix-egress).
#
# Slice 2b-2 (now): replay subscription + idempotent orders writes + monotonic cursor advance.
# Slice 2c will remove the parallel orders write from OrderIngressService.
#
# Example: SPRING_PROFILES_ACTIVE=oms-postgres-projector
#
# Production: set OMS_POSTGRES_PROJECTOR_AERON_DIR to the cluster member's media-driver directory.
# In a multi-host deployment this requires either co-locating the projector JVM on each cluster
# member (recommended for low-latency reads) or using AeronArchive remote replay over UDP — slice
# 2b-2 ships the IPC defaults; UDP variants lift in Phase 5 alongside k8s networking.

oms:
  grpc:
    enabled: false
  fix:
    auto-start: false
  cluster:
    client:
      enabled: false
    projector:
      enabled: ${OMS_POSTGRES_PROJECTOR_ENABLED:true}
      aeron-directory: ${OMS_POSTGRES_PROJECTOR_AERON_DIR:}
      archive-control-request-channel: ${OMS_POSTGRES_PROJECTOR_ARCHIVE_REQ:aeron:ipc?term-length=64k}
      archive-control-response-channel: ${OMS_POSTGRES_PROJECTOR_ARCHIVE_RESP:aeron:ipc?term-length=64k}
      replay-channel: ${OMS_POSTGRES_PROJECTOR_REPLAY_CHANNEL:aeron:ipc?term-length=64k}
      # Replay stream id MUST differ from EVENTS_STREAM_ID (2000) — Aeron Archive replays the
      # recording onto a fresh subscription stream, not the original publication stream.
      replay-stream-id: ${OMS_POSTGRES_PROJECTOR_REPLAY_STREAM_ID:4321}
      # Burst drain tuning — mirrors venue-egress defaults. Raise fragment-limit only when
      # projector_wall_lag_ms climbs at steady admit RPS while ingress_cluster_accept stays low.
      poll-park-nanos: ${OMS_POSTGRES_PROJECTOR_POLL_PARK_NANOS:10000}
      fragment-limit: ${OMS_POSTGRES_PROJECTOR_FRAGMENT_LIMIT:512}
      max-fragments-per-commit: ${OMS_POSTGRES_PROJECTOR_MAX_FRAGMENTS_PER_COMMIT:2048}

# Main HTTP port: the projector role does not serve order-accept HTTP, but Spring Boot's auto-config
# still binds an embedded Tomcat to ${OMS_HTTP_PORT:8088}. On a single-host bench that collides with
# the ingress-replica also on 8088, so default the projector to 8093 here. Override
# OMS_POSTGRES_PROJECTOR_HTTP_PORT when binding elsewhere.
server:
  port: ${OMS_POSTGRES_PROJECTOR_HTTP_PORT:8093}

# Separate management port so probes/metrics do not share the main HTTP connector with other roles deployed nearby.
management:
  server:
    port: ${OMS_POSTGRES_PROJECTOR_MANAGEMENT_SERVER_PORT:8090}
