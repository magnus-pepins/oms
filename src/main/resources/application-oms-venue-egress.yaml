oms:
  grpc:
    enabled: false
  routing:
    backend: internal-venue
  venue:
    grpc-target: ${OMS_VENUE_GRPC_TARGET:localhost:50051}
    grpc-call-timeout-ms: ${OMS_VENUE_GRPC_CALL_TIMEOUT_MS:15000}
    grpc-stream-ack-timeout-ms: ${OMS_VENUE_GRPC_STREAM_ACK_TIMEOUT_MS:10000}
  cluster:
    client:
      role: ${OMS_CLUSTER_CLIENT_ROLE:er-offer-only}
      er-offer:
        # Venue-egress ER flood @ 8–16k/s: 1024 frames/lock + egress interleave every 4 offers.
        max-per-lock-pass: ${OMS_CLUSTER_CLIENT_ER_OFFER_MAX_PER_LOCK_PASS:1024}
        drain-interval-nanos: ${OMS_CLUSTER_CLIENT_ER_OFFER_DRAIN_INTERVAL_NANOS:1000}
        interleave-poll-cap: ${OMS_CLUSTER_CLIENT_ER_OFFER_INTERLEAVE_POLL_CAP:8}
        interleave-poll-every-offers: ${OMS_CLUSTER_CLIENT_ER_OFFER_INTERLEAVE_POLL_EVERY_OFFERS:4}
        interleave-lag-aware-enabled: ${OMS_CLUSTER_CLIENT_ER_OFFER_INTERLEAVE_LAG_AWARE_ENABLED:true}
        interleave-lag-bytes-threshold: ${OMS_CLUSTER_CLIENT_ER_OFFER_INTERLEAVE_LAG_BYTES_THRESHOLD:4096}
        interleave-lag-aware-queue-depth-threshold: ${OMS_CLUSTER_CLIENT_ER_OFFER_INTERLEAVE_LAG_AWARE_QUEUE_DEPTH_THRESHOLD:256}
        interleave-lag-aware-poll-every-offers: ${OMS_CLUSTER_CLIENT_ER_OFFER_INTERLEAVE_LAG_AWARE_POLL_EVERY_OFFERS:1}
      enabled: ${OMS_VENUE_EGRESS_CLUSTER_CLIENT_ENABLED:true}
      aeron-directory: ${OMS_VENUE_EGRESS_CLUSTER_CLIENT_AERON_DIR:${OMS_VENUE_EGRESS_AERON_DIR:}}
      ingress-endpoints: ${OMS_VENUE_EGRESS_CLUSTER_CLIENT_INGRESS_ENDPOINTS:0=localhost:20110}
      ingress-channel: ${OMS_VENUE_EGRESS_CLUSTER_CLIENT_INGRESS_CHANNEL:aeron:udp?endpoint=localhost:0}
      egress-channel: ${OMS_VENUE_EGRESS_CLUSTER_CLIENT_EGRESS_CHANNEL:aeron:udp?endpoint=localhost:0}
    venue-egress:
      enabled: ${OMS_VENUE_EGRESS_ENABLED:true}
      aeron-directory: ${OMS_VENUE_EGRESS_AERON_DIR:}
      archive-control-request-channel: ${OMS_VENUE_EGRESS_ARCHIVE_CONTROL_REQUEST_CHANNEL:aeron:ipc?term-length=64k}
      archive-control-response-channel: ${OMS_VENUE_EGRESS_ARCHIVE_CONTROL_RESPONSE_CHANNEL:aeron:ipc?term-length=64k}
      replay-channel: ${OMS_VENUE_EGRESS_REPLAY_CHANNEL:aeron:ipc?term-length=64k}
      replay-stream-id: ${OMS_VENUE_EGRESS_REPLAY_STREAM_ID:4324}
      venue-route-max-in-flight: ${OMS_CLUSTER_VENUE_EGRESS_VENUE_ROUTE_MAX_IN_FLIGHT:576}
      # Throttle only when ER queue is genuinely saturated (8192 cap on cluster client).
      backlog-throttle-pending-route-threshold: ${OMS_CLUSTER_VENUE_EGRESS_BACKLOG_THROTTLE_PENDING_ROUTE_THRESHOLD:2048}
      backlog-throttle-er-offer-queue-depth-threshold: ${OMS_CLUSTER_VENUE_EGRESS_BACKLOG_THROTTLE_ER_OFFER_QUEUE_DEPTH_THRESHOLD:7168}
      backlog-throttle-max-in-flight: ${OMS_CLUSTER_VENUE_EGRESS_BACKLOG_THROTTLE_MAX_IN_FLIGHT:576}
      backlog-throttle-er-soft-cap-permit-multiplier: ${OMS_CLUSTER_VENUE_EGRESS_BACKLOG_THROTTLE_ER_SOFT_CAP_PERMIT_MULTIPLIER:4}
      backlog-throttle-er-exhausted-cap-permit-multiplier: ${OMS_CLUSTER_VENUE_EGRESS_BACKLOG_THROTTLE_ER_EXHAUSTED_CAP_PERMIT_MULTIPLIER:3}
      backlog-throttle-park-nanos: ${OMS_CLUSTER_VENUE_EGRESS_BACKLOG_THROTTLE_PARK_NANOS:1000}
      # Replay drain tuning (pop @ 15–16k RPS admit): 1µs idle park + 4096 frags/poll + MAX priority threads.
      # pollReplayIdleTail spins 16× before park/recording-walk (mirrors projector @ 10k knee); keep poll-park
      # short so true-idle wake is cheap.
      poll-park-nanos: ${OMS_CLUSTER_VENUE_EGRESS_POLL_PARK_NANOS:1000}
      fragment-limit: ${OMS_CLUSTER_VENUE_EGRESS_FRAGMENT_LIMIT:4096}
      replay-idle-tail-polls: ${OMS_CLUSTER_VENUE_EGRESS_REPLAY_IDLE_TAIL_POLLS:16}
      # Lag-adaptive replay drain: spin-yield + larger poll batches when byte lag or pending routes climb.
      replay-lag-adaptive-excess-lag-bytes-threshold: ${OMS_CLUSTER_VENUE_EGRESS_REPLAY_LAG_ADAPTIVE_EXCESS_LAG_BYTES_THRESHOLD:4096}
      replay-lag-adaptive-pending-routes-threshold: ${OMS_CLUSTER_VENUE_EGRESS_REPLAY_LAG_ADAPTIVE_PENDING_ROUTES_THRESHOLD:256}
      replay-lag-adaptive-fragment-limit: ${OMS_CLUSTER_VENUE_EGRESS_REPLAY_LAG_ADAPTIVE_FRAGMENT_LIMIT:8192}
      replay-lag-adaptive-idle-tail-polls: ${OMS_CLUSTER_VENUE_EGRESS_REPLAY_LAG_ADAPTIVE_IDLE_TAIL_POLLS:64}
      replay-thread-priority: ${OMS_CLUSTER_VENUE_EGRESS_REPLAY_THREAD_PRIORITY:10}
server:
  # Default must not collide with oms-fix-ingress (8095/8092 on pop); ecosystem.config.cjs sets 8097/8098.
  port: ${OMS_VENUE_EGRESS_HTTP_PORT:8097}
management:
  server:
    port: ${OMS_VENUE_EGRESS_MANAGEMENT_SERVER_PORT:8098}
