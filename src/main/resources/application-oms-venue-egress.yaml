oms:
  grpc:
    enabled: false
  routing:
    backend: internal-venue
  venue:
    grpc-target: ${OMS_VENUE_GRPC_TARGET:localhost:50051}
  cluster:
    client:
      enabled: ${OMS_VENUE_EGRESS_CLUSTER_CLIENT_ENABLED:true}
      aeron-directory: ${OMS_VENUE_EGRESS_CLUSTER_CLIENT_AERON_DIR:${OMS_VENUE_EGRESS_AERON_DIR:}}
      ingress-endpoints: ${OMS_VENUE_EGRESS_CLUSTER_CLIENT_INGRESS_ENDPOINTS:0=localhost:20110}
      ingress-channel: ${OMS_VENUE_EGRESS_CLUSTER_CLIENT_INGRESS_CHANNEL:aeron:udp?endpoint=localhost:0}
      egress-channel: ${OMS_VENUE_EGRESS_CLUSTER_CLIENT_EGRESS_CHANNEL:aeron:udp?endpoint=localhost:0}
    venue-egress:
      enabled: ${OMS_VENUE_EGRESS_ENABLED:true}
      aeron-directory: ${OMS_VENUE_EGRESS_AERON_DIR:}
      archive-control-request-channel: ${OMS_VENUE_EGRESS_ARCHIVE_CONTROL_REQUEST_CHANNEL:aeron:ipc?term-length=64k}
      archive-control-response-channel: ${OMS_VENUE_EGRESS_ARCHIVE_CONTROL_RESPONSE_CHANNEL:aeron:ipc?term-length=64k}
      replay-channel: ${OMS_VENUE_EGRESS_REPLAY_CHANNEL:aeron:ipc?term-length=64k}
      replay-stream-id: ${OMS_VENUE_EGRESS_REPLAY_STREAM_ID:4324}
server:
  port: ${OMS_VENUE_EGRESS_HTTP_PORT:8095}
management:
  server:
    port: ${OMS_VENUE_EGRESS_MANAGEMENT_SERVER_PORT:8092}
