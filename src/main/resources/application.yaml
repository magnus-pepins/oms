server:
  port: ${OMS_HTTP_PORT:8088}
  shutdown: graceful

spring:
  application:
    name: oms
  datasource:
    url: ${OMS_PG_URL:jdbc:postgresql://localhost:5432/oms}
    username: ${OMS_PG_USER:oms}
    password: ${OMS_PG_PASSWORD:oms}
    hikari:
      maximum-pool-size: ${OMS_PG_POOL_MAX_SIZE:20}
      minimum-idle: ${OMS_PG_POOL_MIN_IDLE:5}
      connection-timeout: ${OMS_PG_CONNECTION_TIMEOUT_MS:2000}
      pool-name: oms-pg
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  servlet:
    multipart:
      max-file-size: ${OMS_SETTLEMENT_FILE_IMPORT_MAX_BYTES:10000000}
      max-request-size: ${OMS_SETTLEMENT_FILE_IMPORT_MAX_BYTES:10000000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
    prometheus:
      access: read_only
  metrics:
    tags:
      application: oms
      shard_id: ${OMS_SHARD_ID:0}

oms:
  http:
    internal-api-key: ${OMS_INTERNAL_API_KEY:}
  # Internal order ingress over gRPC (OrderIngress.CreateOrder). Metadata: x-oms-internal-key = same value as oms.http.internal-api-key.
  grpc:
    enabled: ${OMS_GRPC_ENABLED:false}
    port: ${OMS_GRPC_PORT:9099}
  otel:
    # When true, starts an OpenTelemetry SdkMeterProvider + Prometheus scrape listener (default port 9464).
    # Micrometer /actuator/prometheus remains available. Use for histogram_quantile(p50/p95) on ingress→FIX NOS.
    metrics-enabled: ${OMS_OTEL_METRICS_ENABLED:false}
    prometheus-port: ${OMS_OTEL_PROMETHEUS_PORT:9464}
    ingress-to-nos-sample-ttl-ms: ${OMS_OTEL_INGRESS_TO_NOS_SAMPLE_TTL_MS:1800000}
    ingress-to-nos-evict-interval-ms: ${OMS_OTEL_INGRESS_TO_NOS_EVICT_INTERVAL_MS:60000}
  shard:
    id: ${OMS_SHARD_ID:0}
    count: ${OMS_SHARD_COUNT:1}
  control:
    # Interim default 5 min — plans/oms-phase0-interim-decisions.md; tune per env.
    max-job-age-ms: ${OMS_CONTROL_MAX_JOB_AGE_MS:300000}
  events:
    nats:
      enabled: ${OMS_NATS_ENABLED:false}
      url: ${OMS_NATS_URL:nats://localhost:4222}
      subject-prefix: ${OMS_NATS_SUBJECT_PREFIX:oms.events}
      stream-name: ${OMS_NATS_STREAM_NAME:OMS_EVENTS}
      connection-timeout-ms: ${OMS_NATS_CONNECTION_TIMEOUT_MS:5000}
  ledger:
    enabled: ${OMS_LEDGER_ENABLED:false}
    base-url: ${OMS_LEDGER_BASE_URL:http://localhost:5001}
    api-key: ${OMS_LEDGER_API_KEY:}
    connect-timeout-ms: ${OMS_LEDGER_CONNECT_TIMEOUT_MS:2000}
    read-timeout-ms: ${OMS_LEDGER_READ_TIMEOUT_MS:5000}
    inflight-reservation-enabled: ${OMS_LEDGER_INFLIGHT_RESERVATION_ENABLED:false}
    inflight-async-enabled: ${OMS_LEDGER_INFLIGHT_ASYNC_ENABLED:false}
    inflight-outbox-reconciler-age-ms: ${OMS_LEDGER_INFLIGHT_OUTBOX_RECONCILER_AGE_MS:2000}
    inflight-outbox-reconciler-batch-size: ${OMS_LEDGER_INFLIGHT_OUTBOX_RECONCILER_BATCH_SIZE:50}
    inflight-outbox-reconciler-interval-ms: ${OMS_LEDGER_INFLIGHT_OUTBOX_RECONCILER_INTERVAL_MS:500}
    inflight-hold-destination-balance-id: ${OMS_LEDGER_INFLIGHT_HOLD_DESTINATION_BALANCE_ID:}
    inflight-reservation-currency: ${OMS_LEDGER_INFLIGHT_RESERVATION_CURRENCY:EUR}
    inflight-reservation-precision: ${OMS_LEDGER_INFLIGHT_RESERVATION_PRECISION:100}
    settlement-outbox-enabled: ${OMS_LEDGER_SETTLEMENT_OUTBOX_ENABLED:false}
    settlement-outbox-reconciler-enabled: ${OMS_LEDGER_SETTLEMENT_OUTBOX_RECONCILER_ENABLED:false}
    settlement-outbox-reconciler-age-ms: ${OMS_LEDGER_SETTLEMENT_OUTBOX_RECONCILER_AGE_MS:2000}
    settlement-outbox-reconciler-batch-size: ${OMS_LEDGER_SETTLEMENT_OUTBOX_RECONCILER_BATCH_SIZE:50}
    settlement-outbox-reconciler-interval-ms: ${OMS_LEDGER_SETTLEMENT_OUTBOX_RECONCILER_INTERVAL_MS:500}
    settlement-posting-http-path: ${OMS_LEDGER_SETTLEMENT_POSTING_HTTP_PATH:/internal/v0/settlement-outbox}
  marketdata:
    enabled: ${OMS_MARKETDATA_HTTP_ENABLED:false}
    base-url: ${OMS_MARKETDATA_HTTP_BASE_URL:http://localhost:6001}
    api-key: ${OMS_MARKETDATA_HTTP_API_KEY:}
    connect-timeout-ms: ${OMS_MARKETDATA_HTTP_CONNECT_TIMEOUT_MS:2000}
    read-timeout-ms: ${OMS_MARKETDATA_HTTP_READ_TIMEOUT_MS:5000}
    instruments-http-path: ${OMS_MARKETDATA_HTTP_INSTRUMENTS_PATH:/internal/v0/instruments}
    nbbo-http-path: ${OMS_MARKETDATA_HTTP_NBBO_PATH:/internal/v0/nbbo}
    instruments-refresh-interval-ms: ${OMS_MARKETDATA_HTTP_INSTRUMENTS_REFRESH_INTERVAL_MS:60000}
    nbbo-in-market-context-enabled: ${OMS_MARKETDATA_HTTP_NBBO_IN_MARKET_CONTEXT_ENABLED:false}
  domain-events:
    reconciler-age-ms: ${OMS_DOMAIN_EVENTS_RECONCILER_AGE_MS:2000}
    reconciler-batch-size: ${OMS_DOMAIN_EVENTS_RECONCILER_BATCH_SIZE:100}
    reconciler-interval-ms: ${OMS_DOMAIN_EVENTS_RECONCILER_INTERVAL_MS:500}
  pii:
    audit-trace-enabled: ${OMS_PII_AUDIT_TRACE_ENABLED:false}
    hash-secret: ${OMS_PII_HASH_SECRET:dev-only-change-me}
  risk:
    instrument-allowlist-enabled: ${OMS_RISK_INSTRUMENT_ALLOWLIST_ENABLED:false}
    allowed-instrument-symbols: ${OMS_RISK_ALLOWED_INSTRUMENT_SYMBOLS:}
    instrument-tradability-check-enabled: ${OMS_RISK_INSTRUMENT_TRADABILITY_CHECK_ENABLED:false}
    instrument-tradability-from-marketdata-enabled: ${OMS_RISK_INSTRUMENT_TRADABILITY_FROM_MARKETDATA_ENABLED:false}
    tradable-instrument-symbols: ${OMS_RISK_TRADABLE_INSTRUMENT_SYMBOLS:}
    instrument-symbol-halt-check-enabled: ${OMS_RISK_INSTRUMENT_SYMBOL_HALT_CHECK_ENABLED:false}
    halted-instrument-symbols: ${OMS_RISK_HALTED_INSTRUMENT_SYMBOLS:}
    fat-finger-max-limit-price: ${OMS_RISK_FAT_FINGER_MAX_LIMIT_PRICE:0}
    fat-finger-max-order-quantity: ${OMS_RISK_FAT_FINGER_MAX_ORDER_QUANTITY:0}
    max-order-notional: ${OMS_RISK_MAX_ORDER_NOTIONAL:0}
    sanctions-recheck-enabled: ${OMS_RISK_SANCTIONS_RECHECK_ENABLED:false}
    sanctions-recheck-strict: ${OMS_RISK_SANCTIONS_RECHECK_STRICT:false}
    sanctions-cache-max-age-seconds: ${OMS_SANCTIONS_CACHE_MAX_AGE_S:3600}
    order-min-interval-ms-per-account: ${OMS_RISK_ORDER_MIN_INTERVAL_MS_PER_ACCOUNT:0}
    tick-size-check-enabled: ${OMS_RISK_TICK_SIZE_CHECK_ENABLED:false}
    tick-size-increment: ${OMS_RISK_TICK_SIZE_INCREMENT:0}
    stp-gate-enabled: ${OMS_RISK_STP_GATE_ENABLED:false}
    stp-gate-reject-all: ${OMS_RISK_STP_GATE_REJECT_ALL:false}
    fix-route-send-enabled-check-enabled: ${OMS_RISK_FIX_ROUTE_SEND_ENABLED_CHECK_ENABLED:false}
    max-aggregate-position-quantity-check-enabled: ${OMS_RISK_MAX_AGGREGATE_POSITION_QUANTITY_CHECK_ENABLED:false}
    max-aggregate-position-quantity: ${OMS_RISK_MAX_AGGREGATE_POSITION_QUANTITY:0}
  routing:
    # noop | fix (fix: QuickFIX/J initiator when oms.fix.auto-start=true — see docs/fix-out.md).
    # The legacy `simulated` backend was removed in Phase 3 slice 3g-2 of the Aeron Cluster substrate plan.
    backend: ${OMS_ROUTING_BACKEND:noop}
    market-context-stub-json: ${OMS_MARKET_CONTEXT_STUB_JSON:{"stub":true}}
    nbbo-reference-in-market-context-enabled: ${OMS_ROUTING_NBBO_REFERENCE_IN_MARKET_CONTEXT_ENABLED:false}
    nbbo-stub-bid-price: ${OMS_ROUTING_NBBO_STUB_BID_PRICE:0}
    nbbo-stub-ask-price: ${OMS_ROUTING_NBBO_STUB_ASK_PRICE:0}
  settlement:
    # Must match a row in custody_accounts (Flyway V11 seeds DEFAULT omnibus).
    default-custody-account-id: ${OMS_SETTLEMENT_DEFAULT_CUSTODY_ACCOUNT_ID:a0000001-0000-4000-8000-000000000001}
    broker-confirm-reconciler-enabled: ${OMS_SETTLEMENT_BROKER_CONFIRM_RECONCILER_ENABLED:false}
    broker-confirm-reconciler-interval-ms: ${OMS_SETTLEMENT_BROKER_CONFIRM_RECONCILER_INTERVAL_MS:10000}
    broker-confirm-reconciler-batch-size: ${OMS_SETTLEMENT_BROKER_CONFIRM_RECONCILER_BATCH_SIZE:50}
    broker-confirm-http-max-execution-ids: ${OMS_SETTLEMENT_BROKER_CONFIRM_HTTP_MAX_EXECUTION_IDS:100}
    file-import-max-bytes: ${OMS_SETTLEMENT_FILE_IMPORT_MAX_BYTES:10000000}
    file-import-max-rows: ${OMS_SETTLEMENT_FILE_IMPORT_MAX_ROWS:10000}
    file-import-register-slice-size: ${OMS_SETTLEMENT_FILE_IMPORT_REGISTER_SLICE_SIZE:50}
    file-import-error-summary-max-chars: ${OMS_SETTLEMENT_FILE_IMPORT_ERROR_SUMMARY_MAX_CHARS:2000}
    file-import-list-max-limit: ${OMS_SETTLEMENT_FILE_IMPORT_LIST_MAX_LIMIT:200}
    file-import-list-default-limit: ${OMS_SETTLEMENT_FILE_IMPORT_LIST_DEFAULT_LIMIT:50}
    manual-action-list-max-limit: ${OMS_SETTLEMENT_MANUAL_ACTION_LIST_MAX_LIMIT:200}
    manual-action-list-default-limit: ${OMS_SETTLEMENT_MANUAL_ACTION_LIST_DEFAULT_LIMIT:50}
    manual-action-type-max-length: ${OMS_SETTLEMENT_MANUAL_ACTION_TYPE_MAX_LENGTH:128}
    manual-action-payload-json-max-chars: ${OMS_SETTLEMENT_MANUAL_ACTION_PAYLOAD_JSON_MAX_CHARS:20000}
    # When true, approve runs supported action_type handlers in the same DB transaction (see ManualSettlementActionTypes).
    manual-action-auto-apply-enabled: ${OMS_SETTLEMENT_MANUAL_ACTION_AUTO_APPLY_ENABLED:true}
    file-import-drop-folder-enabled: ${OMS_SETTLEMENT_FILE_IMPORT_DROP_FOLDER_ENABLED:false}
    file-import-drop-folder-path: ${OMS_SETTLEMENT_FILE_IMPORT_DROP_FOLDER_PATH:}
    file-import-drop-folder-poll-interval-ms: ${OMS_SETTLEMENT_FILE_IMPORT_DROP_FOLDER_POLL_INTERVAL_MS:30000}
    file-import-drop-folder-max-files-per-poll: ${OMS_SETTLEMENT_FILE_IMPORT_DROP_FOLDER_MAX_FILES_PER_POLL:20}
    free-riding-attribution-enabled: ${OMS_SETTLEMENT_FREE_RIDING_ATTRIBUTION_ENABLED:false}
    free-riding-attribution-max-funding-executions: ${OMS_SETTLEMENT_FREE_RIDING_ATTRIBUTION_MAX_FUNDING_EXECUTIONS:8}
  desk:
    snapshot-enabled: ${OMS_DESK_SNAPSHOT_ENABLED:false}
    snapshot-max-limit: ${OMS_DESK_SNAPSHOT_MAX_LIMIT:50}
    snapshot-max-age-hours: ${OMS_DESK_SNAPSHOT_MAX_AGE_HOURS:24}
  fx:
    module-enabled: ${OMS_FX_MODULE_ENABLED:false}
    quote-stub-enabled: ${OMS_FX_QUOTE_STUB_ENABLED:false}
    quote-stub-schema-version: ${OMS_FX_QUOTE_STUB_SCHEMA_VERSION:1}
    nostro-read-enabled: ${OMS_FX_NOSTRO_READ_ENABLED:false}
    nostro-balance-ids-csv: ${OMS_FX_NOSTRO_BALANCE_IDS_CSV:}
    multi-leg-atomicity-stub-enabled: ${OMS_FX_MULTI_LEG_ATOMICITY_STUB_ENABLED:false}
    hedge-hooks-enabled: ${OMS_FX_HEDGE_HOOKS_ENABLED:false}
    eod-flatten-enabled: ${OMS_FX_EOD_FLATTEN_ENABLED:false}
    eod-flatten-interval-ms: ${OMS_FX_EOD_FLATTEN_INTERVAL_MS:86400000}
  corporate-action:
    processor-enabled: ${OMS_CORPORATE_ACTION_PROCESSOR_ENABLED:false}
    processor-interval-ms: ${OMS_CORPORATE_ACTION_PROCESSOR_INTERVAL_MS:60000}
    processor-batch-size: ${OMS_CORPORATE_ACTION_PROCESSOR_BATCH_SIZE:50}
    ingest-instrument-symbol-max-length: ${OMS_CORPORATE_ACTION_INGEST_INSTRUMENT_SYMBOL_MAX_LENGTH:64}
    ingest-action-type-max-length: ${OMS_CORPORATE_ACTION_INGEST_ACTION_TYPE_MAX_LENGTH:64}
    ingest-payload-json-max-chars: ${OMS_CORPORATE_ACTION_INGEST_PAYLOAD_JSON_MAX_CHARS:16000}
    list-max-limit: ${OMS_CORPORATE_ACTION_LIST_MAX_LIMIT:200}
    list-default-limit: ${OMS_CORPORATE_ACTION_LIST_DEFAULT_LIMIT:50}
  fix:
    # When routing.backend=fix and auto-start=true, starts SocketInitiator (oms-fix-egress drives outbound replay).
    auto-start: ${OMS_FIX_AUTO_START:false}
    file-store-path: ${OMS_FIX_FILE_STORE_PATH:./queues/fix}
    socket-connect-host: ${OMS_FIX_SOCKET_CONNECT_HOST:127.0.0.1}
    socket-connect-port: ${OMS_FIX_SOCKET_CONNECT_PORT:9876}
    sender-comp-id: ${OMS_FIX_SENDER_COMP_ID:OMS_INIT}
    target-comp-id: ${OMS_FIX_TARGET_COMP_ID:BROKER_ACCEPT}
    heart-bt-int: ${OMS_FIX_HEART_BT_INT:30}
    venue-id-for-executions: ${OMS_FIX_VENUE_ID_FOR_EXECUTIONS:FIX}
    use-data-dictionary: ${OMS_FIX_USE_DATA_DICTIONARY:false}
    # JSON object: OMS instrument_symbol (case-insensitive key) → broker Symbol on NOS; empty env → {} in Java.
    symbol-map-json: ${OMS_FIX_SYMBOL_MAP_JSON:}
    route-key: ${OMS_FIX_ROUTE_KEY:default}
    # file | jdbc — jdbc uses Spring DataSource + Flyway oms_fix_sessions / oms_fix_messages (V9).
    session-store-type: ${OMS_FIX_SESSION_STORE_TYPE:file}
    route-state-sod-enabled: ${OMS_FIX_ROUTE_STATE_SOD_ENABLED:false}
    route-state-sod-cron: ${OMS_FIX_ROUTE_STATE_SOD_CRON:0 0 6 * * *}
    route-state-sod-policy-mode: ${OMS_FIX_ROUTE_STATE_SOD_POLICY_MODE:always}
    route-state-sod-policy-zone-id: ${OMS_FIX_ROUTE_STATE_SOD_POLICY_ZONE_ID:UTC}
    route-state-sod-policy-calendar-json: ${OMS_FIX_ROUTE_STATE_SOD_POLICY_CALENDAR_JSON:{}}
    socket-use-ssl: ${OMS_FIX_SOCKET_USE_SSL:false}
    socket-key-store: ${OMS_FIX_SOCKET_KEY_STORE:}
    socket-key-store-password: ${OMS_FIX_SOCKET_KEY_STORE_PASSWORD:}
    socket-trust-store: ${OMS_FIX_SOCKET_TRUST_STORE:}
    socket-trust-store-password: ${OMS_FIX_SOCKET_TRUST_STORE_PASSWORD:}
    enabled-ssl-protocols: ${OMS_FIX_ENABLED_SSL_PROTOCOLS:}
    session-jdbc-datasource-enabled: ${OMS_FIX_SESSION_JDBC_DATASOURCE_ENABLED:false}
    session-jdbc-url: ${OMS_FIX_SESSION_JDBC_URL:}
    session-jdbc-user: ${OMS_FIX_SESSION_JDBC_USER:}
    session-jdbc-password: ${OMS_FIX_SESSION_JDBC_PASSWORD:}
    session-jdbc-pool-max-size: ${OMS_FIX_SESSION_JDBC_POOL_MAX_SIZE:5}
    session-jdbc-pool-min-idle: ${OMS_FIX_SESSION_JDBC_POOL_MIN_IDLE:1}
    session-jdbc-connection-timeout-ms: ${OMS_FIX_SESSION_JDBC_CONNECTION_TIMEOUT_MS:2000}
    mass-cancel-on-disconnect-enabled: ${OMS_FIX_MASS_CANCEL_ON_DISCONNECT_ENABLED:false}
    manual-mass-cancel-enabled: ${OMS_FIX_MANUAL_MASS_CANCEL_ENABLED:false}
    manual-mass-cancel-wire-enabled: ${OMS_FIX_MANUAL_MASS_CANCEL_WIRE_ENABLED:false}
    manual-mass-cancel-reason-max-chars: ${OMS_FIX_MANUAL_MASS_CANCEL_REASON_MAX_CHARS:512}

logging:
  level:
    root: INFO
    com.balh.oms: INFO
    org.springframework.web: INFO
