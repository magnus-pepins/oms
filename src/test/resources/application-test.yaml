spring:
  flyway:
    enabled: true
  datasource:
    hikari:
      # Many cached @SpringBootTest contexts each hold a pool against one Testcontainers Postgres.
      # Keep per-context usage low so spring.test.context.cache.maxSize × pool ≤ POSTGRES_MAX_CONNECTIONS
      # in AbstractPostgresIntegrationTest (default PG max_connections=100 is too tight for full CI).
      maximum-pool-size: 2
      minimum-idle: 1

# Surface real messages in IT failure logs (CI + local); test profile only.
server:
  error:
    include-message: always
    include-binding-errors: always

oms:
  http:
    internal-api-key: test-key
  shard:
    id: 0
    count: 1
  control:
    max-job-age-ms: 60000
  outbox:
    reconciler-age-ms: 0
    reconciler-batch-size: 100
    reconciler-interval-ms: 200
  chronicle:
    queue-dir: ./build/test-queues
  events:
    nats:
      enabled: false
  ledger:
    enabled: false
  domain-events:
    reconciler-age-ms: 0
    reconciler-batch-size: 100
    reconciler-interval-ms: 200
  pii:
    audit-trace-enabled: false
    hash-secret: test-secret

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
