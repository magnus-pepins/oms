spring:
  flyway:
    enabled: true
  datasource:
    hikari:
      # Many cached @SpringBootTest contexts each hold a pool against the shared integration Postgres.
      # Budget: spring.test.context.cache.maxSize (build.gradle.kts) × (primary pool below + any
      # oms.fix.session-jdbc-pool-max-size) ≤ Postgres max_connections (GHA service or Testcontainers).
      maximum-pool-size: 2
      minimum-idle: 1

# Surface real messages in IT failure logs (CI + local); test profile only.
server:
  error:
    include-message: always
    include-binding-errors: always

oms:
  http:
    internal-api-key: test-key
  shard:
    id: 0
    count: 1
  control:
    # GHA runners can schedule the full IT suite over several minutes; a short window caused
    # RISK_STALE_QUEUE flakes when control events were still valid. Override via OMS_CONTROL_MAX_JOB_AGE_MS in CI if needed.
    max-job-age-ms: ${OMS_CONTROL_MAX_JOB_AGE_MS:600000}
  outbox:
    reconciler-age-ms: 0
    reconciler-batch-size: 100
    reconciler-interval-ms: 200
  chronicle:
    enabled: false
    queue-dir: ./build/test-queues
  events:
    nats:
      enabled: false
  ledger:
    enabled: false
  # FIX dedicated session-store DataSource (oms.fix.session-jdbc-datasource-enabled=true) uses its own
  # Hikari pool with default max 5 from application.yaml — multiplied by many cached @SpringBootTest
  # contexts it can exhaust shared Testcontainers Postgres (~100 max_connections) before Ryuk teardown.
  fix:
    session-jdbc-pool-max-size: 2
    session-jdbc-pool-min-idle: 1
    # Align with AbstractPostgresIntegrationTest Hikari connection-timeout for slow CI starts.
    session-jdbc-connection-timeout-ms: 60000
  domain-events:
    reconciler-age-ms: 0
    reconciler-batch-size: 100
    reconciler-interval-ms: 200
  pii:
    audit-trace-enabled: false
    hash-secret: test-secret

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
