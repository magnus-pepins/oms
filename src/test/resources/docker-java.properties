# Pin the docker-java client API version so Testcontainers can negotiate with
# Docker Desktop 29.x.
#
# Docker Desktop 29.0+ requires API version >= 1.44 (Engine release notes,
# December 2025). The docker-java client bundled with testcontainers-java
# 1.20.3 defaults to an older version, and the daemon now rejects that
# handshake with the cryptic "Could not find a valid Docker environment"
# error.
#
# Upstream references:
#   - testcontainers/testcontainers-java#11212 (Docker 29.0)
#   - testcontainers/testcontainers-java#11560 (Docker 29.2.x)
#
# Removing this requires upgrading to testcontainers-java >= 2.0.2 (note:
# 2.x renamed several modules). Tracked in
# system-documentation/plans/stock-settlement-production-gap-plan.md §infra.
api.version=1.44
